<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS Feed - AI Posts</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/lucide@latest">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    // Simple icon components
    const Home = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
    const Heart = ({ size = 20, fill = 'none' }) => <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>;
    const Share = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>;
    const MoreHorizontal = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>;
    const Sparkles = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M13 2l3.293 3.293a1 1 0 0 0 1.414 0L21 2M13 2v9M13 2L9.707 5.293a1 1 0 0 1-1.414 0L2 11m11 0h9M13 11l3.293 3.293a1 1 0 0 1 0 1.414L22 20M13 11v9M13 20l-3.293-3.293a1 1 0 0 0-1.414 0L2 20M13 20H4m9-9H4"/></svg>;
    const Search = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>;
    const LogOut = ({ size = 20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>;

    function App() {
      const [posts, setPosts] = useState([]);
      const [loading, setLoading] = useState(false);
      const [filter, setFilter] = useState('all');
      const [customFilter, setCustomFilter] = useState('');
      const [showCustomInput, setShowCustomInput] = useState(false);
      const [user, setUser] = useState(null);
      const [liked, setLiked] = useState(new Set());
      const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
      const [showApiInput, setShowApiInput] = useState(!apiKey);
      const observerTarget = useRef(null);

      const filters = ['all', 'algorithms', 'system-design', 'databases', 'networks', 'security', 'web', 'ml', 'research'];

      useEffect(() => {
        const savedUser = localStorage.getItem('github_user');
        if (savedUser) {
          setUser({ login: savedUser });
        }
      }, []);

      const saveApiKey = () => {
        if (apiKey.trim()) {
          localStorage.setItem('gemini_api_key', apiKey);
          setShowApiInput(false);
        }
      };

      const logout = () => {
        localStorage.removeItem('github_user');
        localStorage.removeItem('gemini_api_key');
        setUser(null);
        setApiKey('');
        setPosts([]);
        setShowApiInput(true);
      };

      const generatePosts = useCallback(async () => {
        if (loading || !apiKey) return;
        setLoading(true);
        try {
          let searchTopic = '';
          const activeFilter = customFilter || filter;
          
          if (activeFilter === 'all') {
            searchTopic = 'latest computer science and technology trends 2024 2025';
          } else {
            searchTopic = `latest ${activeFilter.replace('-', ' ')} in computer science 2024`;
          }

          const prompt = `Search the web for recent information about "${searchTopic}". Then generate 3 engaging, technical Twitter posts (max 280 characters each) based on what you find.

Posts should:
- Be engaging and informative
- Reference recent news, research, or trends
- Include code snippets in \`backticks\`
- Be original and thought-provoking
- Include hashtags when relevant

Return ONLY posts separated by "---"`;

          const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + apiKey, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              contents: [{
                parts: [{ text: prompt }]
              }],
              generationConfig: {
                maxOutputTokens: 1000,
              },
              systemInstruction: {
                parts: [{
                  text: 'You are a computer science expert. Always search the web for latest information. Generate technical Twitter posts.'
                }]
              },
              tools: [{
                googleSearch: {}
              }]
            }),
          });

          if (!response.ok) {
            if (response.status === 401 || response.status === 400) {
              alert('Invalid API key. Please check and try again.');
              setShowApiInput(true);
              return;
            }
            const error = await response.json();
            throw new Error(error.error?.message || 'Failed to generate posts');
          }

          const data = await response.json();
          let responseText = '';
          if (data.candidates && data.candidates[0] && data.candidates[0].content) {
            const parts = data.candidates[0].content.parts || [];
            responseText = parts.map(p => p.text || '').join('');
          }

          if (!responseText) {
            throw new Error('No response from API');
          }

          const newPosts = responseText
            .split('---')
            .map(p => p.trim())
            .filter(p => p.length > 0 && p.length < 500);

          if (newPosts.length > 0) {
            setPosts((prev) => [...prev, ...newPosts]);
          }
        } catch (err) {
          console.error('Error:', err);
          alert('Error: ' + err.message);
        } finally {
          setLoading(false);
        }
      }, [filter, customFilter, loading, apiKey]);

      useEffect(() => {
        const observer = new IntersectionObserver(
          (entries) => {
            if (entries[0].isIntersecting && !loading && apiKey) {
              generatePosts();
            }
          },
          { threshold: 0.1 }
        );

        if (observerTarget.current) {
          observer.observe(observerTarget.current);
        }

        return () => observer.disconnect();
      }, [generatePosts, loading, apiKey]);

      const toggleLike = (id) => {
        const newLiked = new Set(liked);
        if (newLiked.has(id)) {
          newLiked.delete(id);
        } else {
          newLiked.add(id);
        }
        setLiked(newLiked);
      };

      if (showApiInput) {
        return (
          <div className="flex items-center justify-center min-h-screen bg-black">
            <div className="bg-gray-900 rounded-2xl p-6 max-w-sm w-full mx-4 border border-gray-700">
              <h1 className="text-2xl font-black text-blue-400 mb-2">𝕾 CS Feed</h1>
              <p className="text-gray-400 text-sm mb-6">AI-powered posts with Gemini Web Search</p>
              
              <div className="space-y-4">
                <div>
                  <label className="block text-sm font-bold mb-2">Gemini API Key</label>
                  <p className="text-xs text-gray-500 mb-2">
                    Free at: <a href="https://ai.google.dev" target="_blank" className="text-blue-400 underline">ai.google.dev</a>
                  </p>
                  <input
                    type="password"
                    placeholder="Paste API key..."
                    value={apiKey}
                    onChange={(e) => setApiKey(e.target.value)}
                    className="w-full bg-gray-800 text-white p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                  />
                </div>

                <button
                  onClick={saveApiKey}
                  className="w-full p-3 bg-blue-500 text-white font-bold rounded-lg hover:bg-blue-600 disabled:opacity-50"
                  disabled={!apiKey.trim()}
                >
                  Continue
                </button>

                <div className="text-xs text-gray-500 bg-gray-800 p-3 rounded">
                  ✅ Free: 60 requests/min, 1.5M tokens/month
                </div>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="flex h-screen bg-black text-white overflow-hidden">
          {/* Sidebar */}
          <div className="hidden sm:flex sm:w-64 border-r border-gray-700 p-4 flex-col sticky top-0 max-h-screen overflow-y-auto">
            <div className="text-2xl font-black mb-8 text-blue-400">𝕾</div>
            
            <nav className="space-y-4 flex-1">
              {[Home].map((Icon, i) => (
                <div key={i} className="flex items-center space-x-4 p-3 rounded-full hover:bg-gray-900 cursor-pointer text-xl">
                  <Icon size={20} />
                  <span>Home</span>
                </div>
              ))}
            </nav>

            {user && (
              <div className="border-t border-gray-700 pt-4 space-y-3">
                <div className="p-3 bg-gray-900 rounded-2xl text-sm">
                  <p className="font-bold text-gray-400 text-xs uppercase mb-1">User</p>
                  <p className="font-bold">{user.login}</p>
                </div>
                <button
                  onClick={logout}
                  className="w-full p-2 flex items-center gap-2 bg-red-500/10 text-red-400 rounded-lg hover:bg-red-500/20 text-sm font-bold"
                >
                  <LogOut size={16} />
                  Logout
                </button>
              </div>
            )}
          </div>

          {/* Main Feed */}
          <div className="flex-1 max-w-2xl border-r border-gray-700 overflow-y-auto">
            {/* Header */}
            <div className="sticky top-0 z-10 bg-black/80 backdrop-blur border-b border-gray-700 p-4">
              <div className="flex items-center justify-between mb-4">
                <h2 className="text-xl font-bold">Home</h2>
                <Sparkles size={20} className="text-blue-400 cursor-pointer" />
              </div>

              {/* Filter Tabs */}
              <div className="flex overflow-x-auto gap-2 pb-2 scrollbar-hide">
                {filters.map((f) => (
                  <button
                    key={f}
                    onClick={() => {
                      setFilter(f);
                      setCustomFilter('');
                      setShowCustomInput(false);
                      setPosts([]);
                    }}
                    className={`px-4 py-2 rounded-full whitespace-nowrap font-bold transition text-sm ${
                      filter === f && !customFilter
                        ? 'bg-blue-500 text-white'
                        : 'bg-gray-900 text-gray-500 hover:bg-gray-800'
                    }`}
                  >
                    {f.replace('-', ' ')}
                  </button>
                ))}
                <button
                  onClick={() => setShowCustomInput(!showCustomInput)}
                  className={`px-4 py-2 rounded-full whitespace-nowrap font-bold transition text-sm ${
                    customFilter
                      ? 'bg-blue-500 text-white'
                      : 'bg-gray-900 text-gray-500 hover:bg-gray-800'
                  }`}
                >
                  ✨ Custom
                </button>
              </div>

              {/* Custom Filter Input */}
              {showCustomInput && (
                <div className="flex gap-2 mt-3">
                  <input
                    type="text"
                    placeholder="Enter topic (e.g., quantum computing, blockchain)..."
                    value={customFilter}
                    onChange={(e) => setCustomFilter(e.target.value)}
                    onKeyPress={(e) => {
                      if (e.key === 'Enter' && customFilter.trim()) {
                        setFilter('all');
                        setPosts([]);
                      }
                    }}
                    className="flex-1 bg-gray-800 text-white p-2 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                  />
                  <button
                    onClick={() => {
                      if (customFilter.trim()) {
                        setFilter('all');
                        setPosts([]);
                      }
                    }}
                    className="px-4 py-2 bg-blue-500 text-white font-bold rounded-lg hover:bg-blue-600 text-sm"
                  >
                    Go
                  </button>
                </div>
              )}
            </div>

            {/* Posts Feed */}
            <div>
              {posts.length === 0 && !loading && (
                <div className="p-8 text-center text-gray-500">
                  <p className="text-xl font-bold mb-2">Select a category</p>
                  <p className="text-sm">Scroll to load AI posts</p>
                </div>
              )}

              {posts.map((post, idx) => (
                <div key={idx} className="border-b border-gray-700 p-4 hover:bg-gray-900/50 transition cursor-pointer group">
                  <div className="flex gap-3 sm:gap-4">
                    <div className="w-10 h-10 sm:w-12 sm:h-12 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex-shrink-0" />

                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 mb-2 text-sm">
                        <span className="font-bold">AI Expert</span>
                        <span className="text-gray-500 hidden sm:inline">@ai</span>
                        <span className="text-gray-500 hidden sm:inline">·</span>
                        <span className="text-gray-500 text-xs">now</span>
                      </div>

                      <div className="text-sm leading-normal mb-3 break-words">
                        {post.split('`').map((part, i) => 
                          i % 2 === 1 ? (
                            <code key={i} className="bg-gray-900 px-2 py-1 rounded text-red-400 text-xs">
                              {part}
                            </code>
                          ) : (
                            <span key={i}>{part}</span>
                          )
                        )}
                      </div>

                      <div className="flex justify-between text-gray-500 max-w-xs text-xs">
                        <button className="flex items-center gap-1 hover:text-blue-500 hover:bg-blue-500/10 p-2 rounded-full">💬 0</button>
                        <button className="flex items-center gap-1 hover:text-green-500 hover:bg-green-500/10 p-2 rounded-full">🔁 0</button>
                        <button
                          onClick={() => toggleLike(idx)}
                          className={`flex items-center gap-1 p-2 rounded-full ${
                            liked.has(idx) ? 'text-red-500 bg-red-500/10' : 'hover:text-red-500 hover:bg-red-500/10'
                          }`}
                        >
                          ❤️ 0
                        </button>
                        <button className="flex items-center gap-1 hover:text-blue-500 hover:bg-blue-500/10 p-2 rounded-full">📤</button>
                      </div>
                    </div>
                  </div>
                </div>
              ))}

              {loading && (
                <div className="p-8 text-center">
                  <div className="inline-block">
                    <div className="w-8 h-8 border-4 border-gray-700 border-t-blue-500 rounded-full animate-spin" />
                  </div>
                  <p className="text-gray-500 text-sm mt-2">Loading posts...</p>
                </div>
              )}

              <div ref={observerTarget} className="p-4" />
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
